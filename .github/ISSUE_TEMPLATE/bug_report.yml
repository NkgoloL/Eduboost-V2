name: Bug Report
description: Create a report to help us improve.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you see!
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How can we reproduce it?
      description: Detailed steps on how to reproduce the issue.
      placeholder: 1. Go to... 2. Click on...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App Version
      description: Which version of EduBoost V2 are you using?
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please copy and paste any relevant log output.
      render: shell
