name: eduboost-v2

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.v2
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  docs:
    build:
      context: .
      dockerfile: docker/Dockerfile.v2
    command: mkdocs serve -a 0.0.0.0:8001
    ports:
      - "8001:8001"
    volumes:
      - ./docs:/workspace/docs
      - ./app:/workspace/app
      - ./mkdocs.yml:/workspace/mkdocs.yml

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-eduboost}
      - POSTGRES_USER=${POSTGRES_USER:-eduboost_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduboost_user} -d ${POSTGRES_DB:-eduboost}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
