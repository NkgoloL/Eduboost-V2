          type: string
          title: Subscription Tier
      type: object
      required:
      - guardian_id
      - learners
      - total_lessons_generated
      - subscription_tier
      title: ParentDashboardResponse
    ParentTrustDashboardLearner:
      properties:
        learner_id:
          type: string
          title: Learner Id
        display_name:
          type: string
          title: Display Name
        grade_level:
          type: integer
          title: Grade Level
        archetype:
          anyOf:
          - type: string
          - type: 'null'
          title: Archetype
        irt_theta:
          type: number
          title: Irt Theta
        top_knowledge_gaps:
          items:
            type: string
          type: array
          title: Top Knowledge Gaps
        ai_progress_summary:
          type: string
          title: Ai Progress Summary
        lesson_completion_rate_7d:
          type: number
          title: Lesson Completion Rate 7D
        streak_days:
          type: integer
          title: Streak Days
        export_url:
          type: string
          title: Export Url
      type: object
      required:
      - learner_id
      - display_name
      - grade_level
      - archetype
      - irt_theta
      - ai_progress_summary
      - lesson_completion_rate_7d
      - streak_days
      - export_url
      title: ParentTrustDashboardLearner
    ParentTrustDashboardResponse:
      properties:
        guardian_id:
          type: string
          title: Guardian Id
        subscription_tier:
          type: string
          title: Subscription Tier
        generated_at:
          type: string
          format: date-time
          title: Generated At
        learners:
          items:
            $ref: '#/components/schemas/ParentTrustDashboardLearner'
          type: array
          title: Learners
      type: object
      required:
      - guardian_id
      - subscription_tier
      - generated_at
      title: ParentTrustDashboardResponse
    RLHFExportRequest:
      properties:
        records:
          items:
            type: object
          type: array
          title: Records
      type: object
      title: RLHFExportRequest
    RefreshRequest:
      properties:
        refresh_token:
          anyOf:
          - type: string
          - type: 'null'
          title: Refresh Token
      type: object
      title: RefreshRequest
    RegisterRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          minLength: 8
          title: Password
          description: Password must be at least 8 characters and include at least
            one uppercase letter, one lowercase letter, and one number.
        display_name:
          type: string
          maxLength: 120
          minLength: 2
          title: Display Name
        role:
          type: string
          enum:
          - parent
          - teacher
          title: Role
          default: parent
      type: object
      required:
      - email
      - password
      - display_name
      title: RegisterRequest
    StudyPlanGenerateRequest:
      properties:
        gap_ratio:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Gap Ratio
          default: 0.4
      type: object
      title: StudyPlanGenerateRequest
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        expires_in:
          type: integer
          title: Expires In
      type: object
      required:
      - access_token
      - expires_in
      title: TokenResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
