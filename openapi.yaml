      summary: Refresh Token
      operationId: refresh_token_api_v2_auth_refresh_post
      parameters:
      - name: eduboost_refresh
        in: cookie
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Eduboost Refresh
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
