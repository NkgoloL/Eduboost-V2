      description: "Queues the consent renewal reminder job as a FastAPI BackgroundTask.\n\
        Returns 202 immediately; emails are dispatched asynchronously.\n\nAccess:\
        \ Admin role required (RBAC enforced via ``require_role(\"Admin\")``\ndependency\
        \ \u2014 wire once Task #15 RBAC is complete)."
