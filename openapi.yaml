components:
  schemas:
    AwardXPRequest:
      properties:
        learner_id:
          type: string
          title: Learner Id
        xp_amount:
          type: integer
          maximum: 500.0
          minimum: 1.0
          title: Xp Amount
        event_type:
          type: string
          title: Event Type
          default: lesson_completed
        lesson_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Lesson Id
      type: object
      required:
      - learner_id
      - xp_amount
      title: AwardXPRequest
    CheckoutSessionResponse:
      properties:
        checkout_url:
          type: string
          title: Checkout Url
      type: object
      required:
      - checkout_url
      title: CheckoutSessionResponse
    ConsentGrantRequest:
      properties:
        learner_id:
          type: string
          format: uuid
          title: Learner Id
        consent_version:
          type: string
          title: Consent Version
          default: '1.0'
      type: object
      required:
      - learner_id
      title: ConsentGrantRequest
    ConsentRevokeRequest:
      properties:
        learner_id:
          type: string
          format: uuid
          title: Learner Id
        reason:
          type: string
          title: Reason
          default: guardian_request
      type: object
      required:
      - learner_id
      title: ConsentRevokeRequest
    DiagnosticAnswer:
      properties:
        item_id:
          type: string
          title: Item Id
        selected_option:
          type: string
          title: Selected Option
      type: object
      required:
      - item_id
      - selected_option
      title: DiagnosticAnswer
    DiagnosticResult:
      properties:
        session_id:
          type: string
          title: Session Id
        theta_before:
          type: number
          title: Theta Before
        theta_after:
          type: number
          title: Theta After
        gaps_identified:
          items:
            type: string
          type: array
          title: Gaps Identified
        standard_error:
          anyOf:
          - type: number
          - type: 'null'
          title: Standard Error
        grade_equivalent:
          anyOf:
          - type: integer
          - type: 'null'
          title: Grade Equivalent
        ranked_gaps:
          items:
            type: object
          type: array
          title: Ranked Gaps
      type: object
      required:
      - session_id
      - theta_before
      - theta_after
      - gaps_identified
      title: DiagnosticResult
    DiagnosticSubmit:
      properties:
        learner_id:
          type: string
          title: Learner Id
        answers:
          items:
            $ref: '#/components/schemas/DiagnosticAnswer'
          type: array
          title: Answers
      type: object
      required:
      - learner_id
      - answers
      title: DiagnosticSubmit
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    JobAcceptedResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        operation:
          type: string
          title: Operation
        status:
          type: string
          title: Status
          default: queued
      type: object
      required:
      - job_id
      - operation
      title: JobAcceptedResponse
    JobStatusResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        operation:
          type: string
          title: Operation
        status:
          type: string
          title: Status
          default: queued
        payload:
          type: object
          title: Payload
        result:
          anyOf:
          - {}
          - type: 'null'
          title: Result
        error:
          anyOf:
          - type: object
          - type: 'null'
          title: Error
        created_at:
          type: string
          title: Created At
        updated_at:
          type: string
          title: Updated At
      type: object
      required:
      - job_id
      - operation
      - created_at
      - updated_at
      title: JobStatusResponse
    LearnerCreate:
      properties:
        display_name:
          type: string
          maxLength: 80
          minLength: 2
          title: Display Name
        grade:
          type: integer
          maximum: 7.0
          minimum: 0.0
          title: Grade
        language:
          type: string
          title: Language
          default: en
      type: object
      required:
      - display_name
      - grade
      title: LearnerCreate
    LearnerResponse:
      properties:
        id:
          type: string
          title: Id
        pseudonym_id:
          type: string
          title: Pseudonym Id
        display_name:
          type: string
          title: Display Name
        grade:
          type: integer
          title: Grade
        language:
          type: string
          title: Language
        archetype:
          anyOf:
          - type: string
          - type: 'null'
          title: Archetype
        theta:
          type: number
          title: Theta
        xp:
          type: integer
          title: Xp
        streak_days:
          type: integer
          title: Streak Days
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - pseudonym_id
      - display_name
      - grade
      - language
      - archetype
      - theta
      - xp
      - streak_days
      - created_at
      title: LearnerResponse
    LessonRequest:
      properties:
        learner_id:
          type: string
          title: Learner Id
        subject:
          type: string
          maxLength: 60
          minLength: 2
          pattern: ^[a-zA-Z0-9\s\-]+$
          title: Subject
        topic:
          type: string
          maxLength: 120
          minLength: 2
          pattern: ^[a-zA-Z0-9\s\-\(\)\.]+$
          title: Topic
        language:
          type: string
          pattern: ^[a-z]{2}$
          title: Language
          default: en
      type: object
      required:
      - learner_id
      - subject
      - topic
      title: LessonRequest
    LoginRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: LoginRequest
    OnboardingAnswer:
      properties:
        question_id:
          type: integer
          maximum: 5.0
          minimum: 1.0
          title: Question Id
        answer:
          type: string
          title: Answer
      type: object
      required:
      - question_id
      - answer
      title: OnboardingAnswer
    OnboardingResult:
      properties:
        learner_id:
          type: string
          title: Learner Id
        archetype:
          type: string
          title: Archetype
        description:
          type: string
          title: Description
        probabilities:
          additionalProperties:
            type: number
          type: object
          title: Probabilities
      type: object
      required:
      - learner_id
      - archetype
      - description
      title: OnboardingResult
    OnboardingSubmit:
      properties:
        learner_id:
          type: string
          title: Learner Id
        answers:
          items:
            $ref: '#/components/schemas/OnboardingAnswer'
          type: array
          title: Answers
      type: object
      required:
      - learner_id
      - answers
      title: OnboardingSubmit
    ParentDashboardLearner:
      properties:
        learner_id:
          type: string
          format: uuid
          title: Learner Id
        display_name:
          type: string
          title: Display Name
        grade_level:
          type: string
          title: Grade Level
        archetype:
          anyOf:
          - type: string
          - type: 'null'
          title: Archetype
        irt_theta:
          type: number
          title: Irt Theta
        lessons_this_week:
          type: integer
          title: Lessons This Week
        active_knowledge_gaps:
          type: integer
          title: Active Knowledge Gaps
        last_lesson_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Last Lesson At
      type: object
      required:
      - learner_id
      - display_name
      - grade_level
      - archetype
      - irt_theta
      - lessons_this_week
      - active_knowledge_gaps
      - last_lesson_at
