  /v2/popia/deletion-request/{learner_id}:
    post:
      tags:
      - compliance
      summary: Request Learner Deletion
      description: 'POPIA Right-to-Erasure: Request permanent deletion of learner
        data.


        Deletion is staged with a 30-day grace period to allow for withdrawal.

        After 30 days, data is permanently erased.


        Only guardians of that learner can request this.'
