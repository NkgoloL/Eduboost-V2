groups:
  - name: eduboost_critical
    rules:
      - alert: LLMProviderDown
        expr: rate(eduboost_llm_requests_total{status="error"}[5m]) > 0.5
        for: 2m
        labels:
          severity: critical
      - alert: ConsentGateFailureSpike
        expr: rate(eduboost_consent_gate_blocks_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
      - alert: LessonGenerationHighLatency
        expr: histogram_quantile(0.95, rate(eduboost_http_request_duration_seconds_bucket{endpoint=~".*/lessons.*"}[5m])) > 15
        for: 5m
        labels:
          severity: warning
      - alert: JudiciaryHighRejectionRate
        expr: rate(eduboost_judiciary_rejections_total[5m]) / clamp_min(rate(eduboost_judiciary_stamps_total[5m]), 0.001) > 0.1
        for: 5m
        labels:
          severity: warning
      - alert: DiagnosticDropOffSpike
        expr: rate(eduboost_diagnostic_abandonments_total[10m]) > 0.3
        for: 10m
        labels:
          severity: warning
